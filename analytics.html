const benchmarkRingColors = { "TOP DECILE": "#2ECDA7", "TOP QUARTILE": "#5AE0B8", "ABOVE MEDIAN": "#88C8A0", "BELOW MEDIAN": "#C08A70" };

const M = { top: 48, right: 32, bottom: 64, left: 64 };
const W = 820, H = 520;
const PW = W - M.left - M.right, PH = H - M.top - M.bottom;
const X_MIN = 0, X_MAX = 108;

const yRanges = {
  tvpi: { min: 0.68, max: 1.85, ticks: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.4, 1.5, 1.6, 1.7, 1.8], parLine: 1.0 },
  moic: { min: 0.90, max: 2.10, ticks: [1.0, 1.1, 1.2, 1.3, 1.4, 1.5, 1.6, 1.7, 1.8, 1.9, 2.0], parLine: 1.0 },
};

function sx(v) { return M.left + ((v - X_MIN) / (X_MAX - X_MIN)) * PW; }
function sy(v, mode) { const r = yRanges[mode]; return M.top + PH - ((v - r.min) / (r.max - r.min)) * PH; }

const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs = {}, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'textContent') e.textContent = v;
    else e.setAttribute(k.replace(/([A-Z])/g, '-$1').toLowerCase(), v);
  }
  if (parent) parent.appendChild(e);
  return e;
}

function closeCard() { card.classList.remove('visible'); }
document.addEventListener('click', (e) => {

// Get Q4 value (primary), fallback to Q3
function getVal(fund, mode) {
  const q4 = mode === 'tvpi' ? fund.tvpiQ4 : fund.moicQ4;
  const q3 = mode === 'tvpi' ? fund.tvpiQ3 : fund.moicQ3;
  return q4 !== null ? q4 : q3;
}
function getQ4(fund, mode) { return mode === 'tvpi' ? fund.tvpiQ4 : fund.moicQ4; }
function getQ3(fund, mode) { return mode === 'tvpi' ? fund.tvpiQ3 : fund.moicQ3; }

window.switchTab = function(mode) {
  currentMode = mode;
  document.getElementById('tabTvpi').classList.toggle('active', mode === 'tvpi');
  document.getElementById('tabMoic').classList.toggle('active', mode === 'moic');
  const label = mode === 'tvpi' ? 'TVPI' : 'MOIC';
  document.getElementById('mainTitle').textContent = `${label} vs. % Capital Called \u2014 Q4-25`;
  updateContextNote();
  closeCard();
  render();
  renderSummary();
};

const contextNotes = {
  tvpi: "Given the early stage of these funds, benchmark comparisons (Q3-25) may carry noise \u2014 a single markup event within a quarter can shift a fund\u2019s ranking between quartiles. As vintage cohorts mature and deployment levels converge, benchmark positioning will become increasingly meaningful.",
  moic: "No fund in the portfolio currently shows a MOIC below 1.0x \u2014 markdowns have not yet materialized, consistent with the early stage of these investments. When comparing MOIC to TVPI, keep in mind that fund fees and expenses weigh on TVPI, particularly for smaller funds where the fee load represents a larger share of NAV.",
};

function updateContextNote() {
  document.getElementById('contextNote').innerHTML = `<strong style="color:#8A9AB0">Note:</strong> ${contextNotes[currentMode]}`;
}

window.toggleExpand = function(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};

function showCard(fund, cx, cy) {
  const svgEl = document.getElementById('chart');
  const rect = svgEl.getBoundingClientRect();
  const scaleX = rect.width / W, scaleY = rect.height / H;
  const pixelX = cx * scaleX, pixelY = cy * scaleY;
  const mode = currentMode;

  // Build metrics for both TVPI and MOIC
  function buildMetric(m) {
    const label = m.toUpperCase();
    const q4 = m === 'tvpi' ? fund.tvpiQ4 : fund.moicQ4;
    const q3 = m === 'tvpi' ? fund.tvpiQ3 : fund.moicQ3;
    if (q4 !== null) {
      const q3Html = q3 !== null ? `<span class="metric-val-q3">(Q3: ${q3.toFixed(2)}x)</span>` : '';
      return `<div class="metric-block"><div class="metric-label">${label}</div><div><span class="metric-val-q4">${q4.toFixed(2)}x</span>${q3Html}</div></div>`;
    } else if (q3 !== null) {
      return `<div class="metric-block"><div class="metric-label">${label} (Q3)</div><div><span class="metric-val-q3" style="font-size:15px;font-weight:700">${q3.toFixed(2)}x</span></div></div>`;
    }
    return '';
  }

  // % Called
  const calledHtml = `<div class="metric-block"><div class="metric-label">% Called</div><div><span class="metric-val-q4">${fund.pctCalled.toFixed(1)}%</span></div></div>`;

  // Benchmark (TVPI tab only)
  let bmHtml = '';
  if (mode === 'tvpi') {
    if (fund.benchmark) {
      bmHtml = `<div class="card-benchmark"><span class="bm-label">Benchmark Q3-25:</span><span class="bm-value ${benchmarkCSS[fund.benchmark]}">${fund.benchmark}</span></div>`;
    } else {
      bmHtml = `<div class="card-benchmark"><span class="bm-label">Benchmark:</span><span class="bm-value" style="color:#3A4A60"> N/A \u2014 fund too young</span></div>`;
    }
  } else {
    bmHtml = `<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)"></div>`;
  }

  // Holdings
  const holdingsRows = fund.holdings.map(([n, m]) =>
    `<div class="holding-row"><span class="holding-name">${n}</span><span class="holding-moic">${m.toFixed(2)}x</span></div>`
  ).join('');
  const holdingsBtn = fund.holdings.length > 0
    ? `<button class="expand-btn" onclick="toggleExpand(this)"><span class="chev">\u25B8</span> Top Holdings (MOIC Q3-25)</button><div class="expand-content"><div class="holdings-list" style="padding:4px 0 8px">${holdingsRows}</div></div>`
    : '';

  card.innerHTML = `
    <button class="card-close" onclick="closeCard()">\u2715</button>
    <div class="card-name">${fund.name}</div>
    <div class="card-vintage">Vintage ${fund.vintage}</div>
    <div class="card-metrics">
      ${buildMetric('tvpi')}
      ${buildMetric('moic')}
      ${calledHtml}
    </div>
    ${bmHtml}
    <button class="expand-btn" onclick="toggleExpand(this)"><span class="chev">\u25B8</span> Performance Commentary</button>
    <div class="expand-content"><div class="commentary-text">${fund.commentary}</div></div>
    ${holdingsBtn}
  `;

  let left = pixelX + 18, top = pixelY - 80;
  if (left + 330 > rect.width) left = pixelX - 338;
  if (top < 0) top = 4;
  if (top + 320 > rect.height) top = rect.height - 330;
  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.classList.add('visible');
}

function render() {
  svg.innerHTML = '';
  const mode = currentMode;
  const yr = yRanges[mode];

  el('rect', { x: M.left, y: M.top, width: PW, height: PH, fill: 'rgba(255,255,255,0.015)', rx: 4 }, svg);

  // Zone 1: Early Deployment (0-30%)
  el('rect', { x: M.left, y: M.top, width: sx(30) - M.left, height: PH, fill: 'rgba(255,255,255,0.02)' }, svg);
  el('text', { x: (M.left + sx(30)) / 2, y: M.top + PH / 2 - 6, textAnchor: 'middle', fontSize: 9, fill: '#3A4A60', fontWeight: 700, letterSpacing: '0.06em', textContent: 'EARLY' }, svg);
  el('text', { x: (M.left + sx(30)) / 2, y: M.top + PH / 2 + 6, textAnchor: 'middle', fontSize: 9, fill: '#3A4A60', fontWeight: 700, letterSpacing: '0.06em', textContent: 'DEPLOYMENT' }, svg);

  // Zone 2: Early Outperformers (30-80%, above par)
  el('rect', { x: sx(30), y: M.top, width: sx(80) - sx(30), height: sy(yr.parLine, mode) - M.top, fill: 'rgba(46,205,167,0.04)' }, svg);
  el('text', { x: (sx(30) + sx(80)) / 2, y: M.top + 18, textAnchor: 'middle', fontSize: 9.5, fill: '#2A8A6A', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'EARLY OUTPERFORMERS' }, svg);

  // Zone 3: Active J-Curve (30-80%, below par) — TVPI only
  if (mode === 'tvpi') {
    el('rect', { x: sx(30), y: sy(yr.parLine, mode), width: sx(80) - sx(30), height: sy(yr.min, mode) - sy(yr.parLine, mode), fill: 'rgba(232,133,74,0.04)' }, svg);
    el('text', { x: (sx(30) + sx(80)) / 2, y: sy(yr.min, mode) - 10, textAnchor: 'middle', fontSize: 9.5, fill: '#8A6A4A', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.6, textContent: 'ACTIVE J-CURVE' }, svg);
  }

  // Zone 4: Advanced Deployment (80%+)
  el('rect', { x: sx(80), y: M.top, width: sx(X_MAX) - sx(80), height: PH, fill: 'rgba(107,138,232,0.04)' }, svg);
  el('text', { x: (sx(80) + sx(X_MAX)) / 2, y: M.top + PH / 2 - 6, textAnchor: 'middle', fontSize: 9, fill: '#5A6AA0', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'ADVANCED' }, svg);
  el('text', { x: (sx(80) + sx(X_MAX)) / 2, y: M.top + PH / 2 + 6, textAnchor: 'middle', fontSize: 9, fill: '#5A6AA0', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'DEPLOYMENT' }, svg);

  // Zone dividers
  el('line', { x1: sx(30), y1: M.top, x2: sx(30), y2: M.top + PH, stroke: '#2A3A50', strokeWidth: 1, strokeDasharray: '4 3' }, svg);
  el('line', { x1: sx(80), y1: M.top, x2: sx(80), y2: M.top + PH, stroke: '#2A3A50', strokeWidth: 1, strokeDasharray: '4 3' }, svg);

  // Grid Y
  yr.ticks.forEach(t => {
    const isPar = t === yr.parLine;
    el('line', { x1: M.left, y1: sy(t, mode), x2: M.left + PW, y2: sy(t, mode), stroke: isPar ? '#2ECDA750' : '#1A2A3A', strokeWidth: isPar ? 1.2 : 0.5, strokeDasharray: isPar ? '7 4' : 'none' }, svg);
    el('text', { x: M.left - 8, y: sy(t, mode) + 4, textAnchor: 'end', fontSize: 11, fill: isPar ? '#5ABAAA' : '#3A4A60', fontWeight: isPar ? 700 : 400, textContent: t.toFixed(1) + 'x' }, svg);
  });

  // Grid X
  [0, 20, 40, 60, 80, 100].forEach(t => {
    el('line', { x1: sx(t), y1: M.top, x2: sx(t), y2: M.top + PH, stroke: '#1A2A3A', strokeWidth: 0.5 }, svg);
    el('text', { x: sx(t), y: M.top + PH + 18, textAnchor: 'middle', fontSize: 11, fill: '#3A4A60', textContent: t + '%' }, svg);
  });

  // Axis labels
  el('text', { x: sx((X_MIN + X_MAX) / 2), y: M.top + PH + 48, textAnchor: 'middle', fontSize: 12, fill: '#4A5A70', fontWeight: 600, textContent: '% Capital Called' }, svg);
  const yLabel = mode === 'tvpi' ? 'TVPI' : 'MOIC';
  el('text', { x: 14, y: sy((yr.min + yr.max) / 2, mode), textAnchor: 'middle', fontSize: 12, fill: '#4A5A70', fontWeight: 600, textContent: yLabel, transform: `rotate(-90, 14, ${sy((yr.min + yr.max) / 2, mode)})` }, svg);

  // Dots
  funds.forEach(fund => {
    const val = getVal(fund, mode);
    if (val === null || val === undefined) return;
    const cx = sx(fund.pctCalled), cyy = sy(val, mode);
    const isActive = !activeVintage || fund.vintage === activeVintage;
    const color = vintageConfig[fund.vintage].color;

    if (!isActive) {
      el('circle', { cx, cy: cyy, r: 7, fill: color, opacity: 0.08 }, svg);
      return;
    }

    const g = el('g', { class: 'dot-group', style: 'cursor:pointer' }, svg);
    const glow = el('circle', { cx, cy: cyy, r: 16, fill: color, opacity: 0 }, g);
    el('circle', { cx, cy: cyy, r: 7, fill: color, stroke: '#0A1020', strokeWidth: 2, opacity: 0.9 }, g);

    if (mode === 'tvpi' && fund.benchmark) {
      el('circle', { cx, cy: cyy, r: 10.5, fill: 'none', stroke: benchmarkRingColors[fund.benchmark], strokeWidth: 1.8, opacity: 0.5 }, g);
    }

    g.addEventListener('mouseenter', () => { glow.setAttribute('opacity', '0.1'); });
    g.addEventListener('mouseleave', () => { glow.setAttribute('opacity', '0'); });
    g.addEventListener('click', (e) => { e.stopPropagation(); showCard(fund, cx, cyy); });
  });
}

function renderControls() {
  const ctr = document.getElementById('controls');
  ctr.innerHTML = '<span class="controls-label">Vintage:</span>';
  Object.entries(vintageConfig).forEach(([yr, cfg]) => {
    const btn = document.createElement('button');
    btn.className = 'vint-btn' + (activeVintage === +yr ? ' active' : '');
    btn.style.setProperty('--vc', cfg.color);
    btn.innerHTML = `<span class="vint-dot" style="background:${cfg.color}"></span><span class="vint-text" style="color:${cfg.color}">${yr}</span>`;
    btn.onclick = () => { activeVintage = activeVintage === +yr ? null : +yr; closeCard(); renderControls(); render(); };
    ctr.appendChild(btn);
  });
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.innerHTML = `<svg width="14" height="14" xmlns="${NS}"><circle cx="7" cy="7" r="4" fill="#00CFDD" stroke="#0A1020" stroke-width="1.5"/><circle cx="7" cy="7" r="6.5" fill="none" stroke="#2ECDA7" stroke-width="1.2" opacity="0.4"/></svg> benchmark ring (TVPI only) \u00B7 click dot for details`;
  ctr.appendChild(hint);
}

function renderSummary() {
  const mode = currentMode;
  const valid = funds.filter(f => getVal(f, mode) !== null);
  const par = yRanges[mode].parLine;
  const earlyDeploy = valid.filter(f => f.pctCalled < 30);
  const outperformers = valid.filter(f => f.pctCalled >= 30 && f.pctCalled < 80 && getVal(f, mode) >= par);
  const activeJ = valid.filter(f => f.pctCalled >= 30 && f.pctCalled < 80 && getVal(f, mode) < par);
  const advanced = valid.filter(f => f.pctCalled >= 80);
  const avgAdv = advanced.length ? (advanced.reduce((s, f) => s + getVal(f, mode), 0) / advanced.length).toFixed(2) : '\u2014';
  const label = mode.toUpperCase();

  const stats = [
    { value: earlyDeploy.length, label: 'Early Deployment', sub: '<30% called', accent: '#5C5C6B' },
    { value: outperformers.length, label: 'Early Outperformers', sub: `30-80% & ${label} \u2265${par.toFixed(1)}x`, accent: '#A4C48C' },
    { value: activeJ.length, label: mode === 'tvpi' ? 'Active J-Curve' : 'Building Value', sub: `30-80% & ${label} <${par.toFixed(1)}x`, accent: '#D4A574' },
    { value: advanced.length, label: 'Advanced Deployment', sub: `>80% \u00B7 avg ${label} ${avgAdv}x`, accent: '#8B9CC4' },
  ];

  const container = document.getElementById('summary');
  container.innerHTML = '';
  stats.forEach(s => {
    const c = document.createElement('div');
    c.className = 'stat-card';
    c.style.borderLeft = `3px solid ${s.accent}`;
    c.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div><div class="stat-sub">${s.sub}</div>`;
    container.appendChild(c);
  });
}

renderControls();
updateContextNote();
render();
renderSummary();
} // end initDashboard
</script>
</body>
</html>
