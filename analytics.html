<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veronorte FoF I — Portfolio Analytics</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="icon" href="favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" defer></script>
<script src="dashboard_data.js" defer></script>
<style>
  /* ── Password Gate ── */
  .pw-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: #060B18;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Open Sans', sans-serif;
  }
  .pw-gate.hidden { display: none; }
  .pw-box {
    text-align: center;
    max-width: 380px;
    padding: 0 24px;
  }
  .pw-box img {
    height: 40px;
    margin-bottom: 2.5rem;
    opacity: 0.6;
  }
  .pw-box h2 {
    font-size: 1.1rem;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
  }
  .pw-box input {
    width: 100%;
    padding: 0.85rem 1.2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: #E0E6EF;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    outline: none;
    transition: border-color 0.2s;
  }
  .pw-box input::placeholder { color: rgba(255,255,255,0.2); }
  .pw-box input:focus { border-color: rgba(149,214,0,0.35); }
  .pw-box input.error { border-color: rgba(224,122,95,0.6); animation: shake 0.4s ease; }
  .pw-box button {
    width: 100%;
    margin-top: 0.75rem;
    padding: 0.85rem;
    background: #95D600;
    color: #1D1F29;
    border: none;
    border-radius: 6px;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .pw-box button:hover { background: #a8e61a; }
  .pw-hint {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.15);
    margin-top: 1.2rem;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  /* ── Analytics Content (hidden until authenticated) ── */
  .analytics-content { display: none; }
  .analytics-content.visible { display: block; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060B18; color: #E0E6EF; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .page { max-width: 920px; margin: 0 auto; padding: 36px 24px 32px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .logo-area { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; border-radius: 6px; background: linear-gradient(135deg, #2ECDA7 0%, #1A8A6E 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #060B18; }
  .logo-text { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: #C0CCE0; }
  .logo-sub { font-size: 10px; color: #5A6A80; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
  .report-badge { font-size: 10px; color: #5A6A80; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; padding: 3px 10px; letter-spacing: 0.05em; text-transform: uppercase; }

  .title-section { margin-bottom: 20px; }
  .title-section h1 { font-size: 24px; font-weight: 700; color: #F0F4FA; line-height: 1.2; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 3px; width: fit-content; }
  .tab-btn { font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.03em; padding: 7px 20px; border-radius: 6px; border: none; cursor: pointer; background: transparent; color: #5A6A80; transition: all 0.15s; }
  .tab-btn.active { background: rgba(46,205,167,0.12); color: #2ECDA7; }
  .tab-btn:hover:not(.active) { color: #8A9AB0; }

  .context-note { margin: 12px 0 14px; padding: 10px 14px; background: rgba(255,255,255,0.02); border-left: 3px solid #2ECDA740; border-radius: 0 6px 6px 0; font-size: 11.5px; line-height: 1.6; color: #6A7A90; }

  .controls { display: flex; gap: 14px; padding: 0 0 12px; align-items: center; flex-wrap: wrap; }
  .controls-label { font-size: 10px; color: #4A5A70; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .vint-btn { display: flex; align-items: center; gap: 5px; background: transparent; border: 1.5px solid transparent; border-radius: 6px; padding: 3px 10px; cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
  .vint-btn.active { border-color: var(--vc) !important; background: rgba(255,255,255,0.03); }
  .vint-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .vint-text { font-size: 11px; font-weight: 600; }
  .hint { margin-left: auto; font-size: 10px; color: #3A4A60; display: flex; align-items: center; gap: 6px; }

  .chart-wrap { position: relative; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
  .chart-svg { display: block; overflow: visible; }

  .fund-card { position: absolute; background: #0F1A2E; border: 1px solid rgba(46,205,167,0.15); color: #D0DAE8; border-radius: 12px; padding: 16px 18px; width: 320px; z-index: 100; box-shadow: 0 12px 40px rgba(0,0,0,0.5); font-size: 12px; line-height: 1.4; display: none; }
  .fund-card.visible { display: block; }
  .card-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: #4A5A70; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .card-close:hover { color: #C0CCE0; background: rgba(255,255,255,0.06); }
  .card-name { font-size: 14px; font-weight: 700; color: #F0F4FA; margin-bottom: 2px; padding-right: 24px; }
  .card-vintage { font-size: 11px; color: #5A7A70; margin-bottom: 10px; }
  .card-metrics { margin-bottom: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
  .metric-block { }
  .metric-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: #8A9AB0; margin-bottom: 2px; }
  .metric-val-q4 { font-size: 15px; font-weight: 700; color: #2ECDA7; }
  .metric-val-q3 { font-size: 11px; font-weight: 500; color: #8A9AB0; margin-left: 4px; }
  .card-benchmark { font-size: 11px; margin: 8px 0 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .bm-label { color: #8A9AB0; }
  .bm-value { font-weight: 700; margin-left: 4px; }
  .bm-top-decile { color: #2ECDA7; }
  .bm-top-quartile { color: #5AE0B8; }
  .bm-above-median { color: #88C8A0; }
  .bm-below-median { color: #C08A70; }

  .expand-btn { display: flex; align-items: center; gap: 6px; width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 6px; padding: 7px 10px; cursor: pointer; color: #5A7A90; font-size: 11px; font-weight: 600; font-family: inherit; margin-bottom: 5px; transition: all 0.15s; text-align: left; }
  .expand-btn:hover { background: rgba(255,255,255,0.04); color: #8AAAB0; }
  .expand-btn .chev { display: inline-block; transition: transform 0.2s; font-size: 10px; width: 12px; }
  .expand-btn.open .chev { transform: rotate(90deg); }

  .holding-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
  .holding-name { color: #8AA0B0; }
  .holding-moic { color: #C0D0E0; font-weight: 600; font-variant-numeric: tabular-nums; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px; padding: 12px 14px; }
  .stat-value { font-size: 22px; font-weight: 700; color: #F0F4FA; }
  .stat-label { font-size: 10px; font-weight: 600; color: #5A6A80; line-height: 1.3; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-sub { font-size: 10px; color: #3A4A60; margin-top: 2px; }
  @media (max-width: 640px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .page { padding: 20px 14px; }
    .fund-card { width: 280px; }
    .title-section h1 { font-size: 20px; }
  }

  /* ── Dashboard Tab ── */
  .page.dash-active { max-width: 1200px; }
  #dashboardPanel { padding: 0 0 40px; }
  .dash-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .dash-date { font-size: 10px; color: #5A6A80; letter-spacing: 0.06em; text-transform: uppercase; }
  .kpi-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .kpi { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 130px; }
  .kpi-label { display: block; font-size: 0.58rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #5A6A80; margin-bottom: 4px; }
  .kpi-value { display: block; font-size: 1.4rem; font-weight: 300; color: #F0F4FA; }
  .kpi-sub { display: block; font-size: 0.68rem; margin-top: 2px; color: #5A6A80; }
  .dash-grid { display: grid; gap: 16px; margin-bottom: 20px; }
  .dash-grid.two { grid-template-columns: 1fr 1fr; }
  .dash-grid.full { grid-template-columns: 1fr; }
  .dash-chart { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 16px; min-height: 320px; }
  .dash-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 8px 0 20px; }
  .dash-print-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #E0E6EF; font-family: inherit; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: border-color 0.2s; }
  .dash-print-btn:hover { border-color: rgba(149,214,0,0.35); }
  @media (max-width: 900px) {
    .dash-grid.two { grid-template-columns: 1fr; }
    .kpi { min-width: 110px; padding: 10px 14px; }
  }
  @media print {
    .pw-gate, .tabs, .dash-print-btn { display: none !important; }
    .page.dash-active { max-width: 100%; }
    .kpi, .dash-chart { border-color: #e0e0e0; background: white; }
    .kpi-value, .kpi-label { color: #1D1F29; }
    .kpi-sub { color: #666; }
    .dash-grid { page-break-inside: avoid; break-inside: avoid; }
  }
</style>
</head>
<body>

<script>
// ── Password Gate ──
function checkPassword(e) {
  e.preventDefault();
  var input = document.getElementById('pwInput');
  if (input.value === 'Futurocompartido') {
    document.getElementById('pwGate').classList.add('hidden');
    document.getElementById('analyticsContent').classList.add('visible');
    initDashboard();
  } else {
    input.classList.add('error');
    input.value = '';
    input.placeholder = 'Incorrect code';
    setTimeout(function() { input.classList.remove('error'); }, 400);
  }
  return false;
}

function initDashboard() {

if (typeof SCATTER_DATA === 'undefined') {
  document.getElementById('mainTitle').textContent = 'Loading data…';
  setTimeout(initDashboard, 500);
  return;
}

// Build fund array for a given quarter from SCATTER_DATA
var selectedQuarter = SCATTER_DATA.quarters[SCATTER_DATA.quarters.length - 1];
var funds = [];

function buildFunds(q) {
  var qi = SCATTER_DATA.quarters.indexOf(q);
  var prevQ = qi > 0 ? SCATTER_DATA.quarters[qi - 1] : null;
  var result = [];
  for (var fid in SCATTER_DATA.funds) {
    var f = SCATTER_DATA.funds[fid];
    var d = f.data[q];
    if (!d) continue;
    var prev = prevQ ? f.data[prevQ] : null;
    result.push({
      name: f.name,
      short_name: f.short_name,
      vintage: f.vintage,
      tvpi: d.tvpi,
      tvpiPrev: prev ? prev.tvpi : null,
      moic: d.moic,
      moicPrev: prev ? prev.moic : null,
      pctCalled: d.pctCalled,
      pctCalledPrev: prev ? prev.pctCalled : null,
      benchmark: f.benchmark,
      holdings: d.holdings || [],
      commentary: f.commentary || '',
    });
  }
  return result;
}
funds = buildFunds(selectedQuarter);

var vintageConfig = {};
for (var yr in SCATTER_DATA.vintage_colors) {
  vintageConfig[+yr] = { color: SCATTER_DATA.vintage_colors[yr] };
}

const benchmarkCSS = { "TOP DECILE": "bm-top-decile", "TOP QUARTILE": "bm-top-quartile", "ABOVE MEDIAN": "bm-above-median", "BELOW MEDIAN": "bm-below-median" };
const benchmarkRingColors = { "TOP DECILE": "#2ECDA7", "TOP QUARTILE": "#5AE0B8", "ABOVE MEDIAN": "#88C8A0", "BELOW MEDIAN": "#C08A70" };

const M = { top: 48, right: 32, bottom: 64, left: 64 };
const W = 820, H = 520;
const PW = W - M.left - M.right, PH = H - M.top - M.bottom;
const X_MIN = 0, X_MAX = 108;

function computeYRange(mode) {
  var vals = funds.map(function(f) { return mode === 'tvpi' ? f.tvpi : f.moic; }).filter(function(v) { return v !== null && v !== undefined; });
  if (!vals.length) return { min: 0.7, max: 1.8, ticks: [0.8,0.9,1.0,1.1,1.2,1.3,1.4,1.5,1.6,1.7], parLine: 1.0 };
  var lo = Math.min.apply(null, vals);
  var hi = Math.max.apply(null, vals);
  var pad = Math.max((hi - lo) * 0.15, 0.1);
  var rangeMin = Math.floor((lo - pad) * 10) / 10;
  var rangeMax = Math.ceil((hi + pad) * 10) / 10;
  if (rangeMin > 0.9) rangeMin = Math.floor((lo - pad) * 10) / 10;
  var ticks = [];
  for (var t = rangeMin; t <= rangeMax + 0.01; t += 0.1) {
    ticks.push(Math.round(t * 10) / 10);
  }
  return { min: rangeMin, max: rangeMax, ticks: ticks, parLine: 1.0 };
}

var yRanges = { tvpi: computeYRange('tvpi'), moic: computeYRange('moic') };

function sx(v) { return M.left + ((v - X_MIN) / (X_MAX - X_MIN)) * PW; }
function sy(v, mode) { var r = yRanges[mode]; return M.top + PH - ((v - r.min) / (r.max - r.min)) * PH; }

const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs, parent) {
  attrs = attrs || {};
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'textContent') e.textContent = v;
    else e.setAttribute(k.replace(/([A-Z])/g, '-$1').toLowerCase(), v);
  }
  if (parent) parent.appendChild(e);
  return e;
}

let activeVintage = null;
let currentMode = 'tvpi';
const svg = document.getElementById('chart');
const card = document.getElementById('fundCard');

function closeCard() { card.classList.remove('visible'); }
window.closeCard = closeCard;
document.addEventListener('click', (e) => {
  if (!e.target.closest('.fund-card') && !e.target.closest('.dot-group')) closeCard();
});

function getVal(fund, mode) {
  return mode === 'tvpi' ? fund.tvpi : fund.moic;
}

function changeQuarter(q) {
  selectedQuarter = q;
  funds = buildFunds(q);
  yRanges = { tvpi: computeYRange('tvpi'), moic: computeYRange('moic') };
  closeCard();
  var qLabel = SCATTER_DATA.quarter_labels[q] || q;
  var label = currentMode === 'tvpi' ? 'TVPI' : 'MOIC';
  document.getElementById('mainTitle').textContent = label + ' vs. % Capital Called — ' + qLabel;
  render();
  renderSummary();
}

window.switchTab = function(mode) {
  currentMode = mode;
  document.getElementById('tabTvpi').classList.toggle('active', mode === 'tvpi');
  document.getElementById('tabMoic').classList.toggle('active', mode === 'moic');
  document.getElementById('tabDash').classList.toggle('active', mode === 'dashboard');

  var isDash = (mode === 'dashboard');
  ['mainTitle','contextNote','controls','chartWrap','summary'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = isDash ? 'none' : '';
  });
  document.getElementById('dashboardPanel').style.display = isDash ? 'block' : 'none';
  document.querySelector('.page').classList.toggle('dash-active', isDash);

  if (isDash) {
    if (!window._dashRendered && typeof Plotly !== 'undefined' && typeof renderDashboard === 'function') { renderDashboard(); window._dashRendered = true; }
    return;
  }

  var qLabel = SCATTER_DATA.quarter_labels[selectedQuarter] || selectedQuarter;
  const label = mode === 'tvpi' ? 'TVPI' : 'MOIC';
  document.getElementById('mainTitle').textContent = label + ' vs. % Capital Called — ' + qLabel;
  updateContextNote();
  closeCard();
  render();
  renderSummary();
};

const contextNotes = {
  tvpi: "Given the early stage of these funds, benchmark comparisons may carry noise — a single markup event within a quarter can shift a fund’s ranking between quartiles. As vintage cohorts mature, benchmark positioning will become increasingly meaningful.",
  moic: "When comparing MOIC to TVPI, keep in mind that fund fees and expenses weigh on TVPI, particularly for smaller funds where the fee load represents a larger share of NAV.",
};

function updateContextNote() {
  document.getElementById('contextNote').innerHTML = '<strong style="color:#8A9AB0">Note:</strong> ' + contextNotes[currentMode];
}

window.toggleExpand = function(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
};

function fmtFV(v) {
  if (v == null) return '—';
  var abs = Math.abs(v);
  if (abs >= 1e6) return '$' + (abs/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return '$' + (abs/1e3).toFixed(0) + 'K';
  return '$' + abs.toFixed(0);
}

function showCard(fund, cx, cy) {
  const svgEl = document.getElementById('chart');
  const rect = svgEl.getBoundingClientRect();
  const scaleX = rect.width / W, scaleY = rect.height / H;
  const pixelX = cx * scaleX, pixelY = cy * scaleY;
  const mode = currentMode;
  var qLabel = SCATTER_DATA.quarter_labels[selectedQuarter] || '';
  var qi = SCATTER_DATA.quarters.indexOf(selectedQuarter);
  var prevQ = qi > 0 ? SCATTER_DATA.quarters[qi - 1] : null;
  var prevLabel = prevQ ? SCATTER_DATA.quarter_labels[prevQ] : '';

  function buildMetric(m) {
    var label = m.toUpperCase();
    var val = m === 'tvpi' ? fund.tvpi : fund.moic;
    var prev = m === 'tvpi' ? fund.tvpiPrev : fund.moicPrev;
    if (val !== null && val !== undefined) {
      var prevHtml = prev !== null && prev !== undefined ? '<span class="metric-val-q3">(' + prevLabel + ': ' + prev.toFixed(2) + 'x)</span>' : '';
      return '<div class="metric-block"><div class="metric-label">' + label + '</div><div><span class="metric-val-q4">' + val.toFixed(2) + 'x</span>' + prevHtml + '</div></div>';
    }
    return '';
  }

  var calledHtml = '<div class="metric-block"><div class="metric-label">% Called</div><div><span class="metric-val-q4">' + (fund.pctCalled !== null ? fund.pctCalled.toFixed(1) + '%' : '—') + '</span></div></div>';

  var bmHtml = '';
  if (mode === 'tvpi') {
    if (fund.benchmark) {
      bmHtml = '<div class="card-benchmark"><span class="bm-label">Benchmark:</span><span class="bm-value ' + (benchmarkCSS[fund.benchmark] || '') + '">' + fund.benchmark + '</span></div>';
    } else {
      bmHtml = '<div class="card-benchmark"><span class="bm-label">Benchmark:</span><span class="bm-value" style="color:#3A4A60"> N/A</span></div>';
    }
  } else {
    bmHtml = '<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05)"></div>';
  }

  var holdingsRows = fund.holdings.map(function(h) {
    var fvStr = fmtFV(h.fv);
    var moicStr = h.moic ? h.moic.toFixed(2) + 'x' : '—';
    return '<div class="holding-row"><span class="holding-name">' + h.name + '</span><span class="holding-moic">' + fvStr + ' (' + moicStr + ')</span></div>';
  }).join('');
  var holdingsBtn = fund.holdings.length > 0
    ? '<button class="expand-btn" onclick="toggleExpand(this)"><span class="chev">▸</span> Top Holdings (by Fair Value)</button><div class="expand-content"><div class="holdings-list" style="padding:4px 0 8px">' + holdingsRows + '</div></div>'
    : '';

  card.innerHTML =
    '<button class="card-close" onclick="closeCard()">✕</button>' +
    '<div class="card-name">' + fund.name + '</div>' +
    '<div class="card-vintage">Vintage ' + fund.vintage + '</div>' +
    '<div class="card-metrics">' + buildMetric('tvpi') + buildMetric('moic') + calledHtml + '</div>' +
    bmHtml +
    '<button class="expand-btn" onclick="toggleExpand(this)"><span class="chev">▸</span> Performance Commentary</button>' +
    '<div class="expand-content"><div class="commentary-text">' + fund.commentary + '</div></div>' +
    holdingsBtn;

  let left = pixelX + 18, top = pixelY - 80;
  if (left + 330 > rect.width) left = pixelX - 338;
  if (top < 0) top = 4;
  if (top + 320 > rect.height) top = rect.height - 330;
  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.classList.add('visible');
}

function render() {
  svg.innerHTML = '';
  const mode = currentMode;
  const yr = yRanges[mode];

  el('rect', { x: M.left, y: M.top, width: PW, height: PH, fill: 'rgba(255,255,255,0.015)', rx: 4 }, svg);

  el('rect', { x: M.left, y: M.top, width: sx(30) - M.left, height: PH, fill: 'rgba(255,255,255,0.02)' }, svg);
  el('text', { x: (M.left + sx(30)) / 2, y: M.top + PH / 2 - 6, textAnchor: 'middle', fontSize: 9, fill: '#3A4A60', fontWeight: 700, letterSpacing: '0.06em', textContent: 'EARLY' }, svg);
  el('text', { x: (M.left + sx(30)) / 2, y: M.top + PH / 2 + 6, textAnchor: 'middle', fontSize: 9, fill: '#3A4A60', fontWeight: 700, letterSpacing: '0.06em', textContent: 'DEPLOYMENT' }, svg);

  el('rect', { x: sx(30), y: M.top, width: sx(80) - sx(30), height: sy(yr.parLine, mode) - M.top, fill: 'rgba(46,205,167,0.04)' }, svg);
  el('text', { x: (sx(30) + sx(80)) / 2, y: M.top + 18, textAnchor: 'middle', fontSize: 9.5, fill: '#2A8A6A', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'EARLY OUTPERFORMERS' }, svg);

  if (mode === 'tvpi') {
    el('rect', { x: sx(30), y: sy(yr.parLine, mode), width: sx(80) - sx(30), height: sy(yr.min, mode) - sy(yr.parLine, mode), fill: 'rgba(232,133,74,0.04)' }, svg);
    el('text', { x: (sx(30) + sx(80)) / 2, y: sy(yr.min, mode) - 10, textAnchor: 'middle', fontSize: 9.5, fill: '#8A6A4A', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.6, textContent: 'ACTIVE J-CURVE' }, svg);
  }

  el('rect', { x: sx(80), y: M.top, width: sx(X_MAX) - sx(80), height: PH, fill: 'rgba(107,138,232,0.04)' }, svg);
  el('text', { x: (sx(80) + sx(X_MAX)) / 2, y: M.top + PH / 2 - 6, textAnchor: 'middle', fontSize: 9, fill: '#5A6AA0', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'ADVANCED' }, svg);
  el('text', { x: (sx(80) + sx(X_MAX)) / 2, y: M.top + PH / 2 + 6, textAnchor: 'middle', fontSize: 9, fill: '#5A6AA0', fontWeight: 700, letterSpacing: '0.06em', opacity: 0.7, textContent: 'DEPLOYMENT' }, svg);

  el('line', { x1: sx(30), y1: M.top, x2: sx(30), y2: M.top + PH, stroke: '#2A3A50', strokeWidth: 1, strokeDasharray: '4 3' }, svg);
  el('line', { x1: sx(80), y1: M.top, x2: sx(80), y2: M.top + PH, stroke: '#2A3A50', strokeWidth: 1, strokeDasharray: '4 3' }, svg);

  yr.ticks.forEach(t => {
    const isPar = t === yr.parLine;
    el('line', { x1: M.left, y1: sy(t, mode), x2: M.left + PW, y2: sy(t, mode), stroke: isPar ? '#2ECDA750' : '#1A2A3A', strokeWidth: isPar ? 1.2 : 0.5, strokeDasharray: isPar ? '7 4' : 'none' }, svg);
    el('text', { x: M.left - 8, y: sy(t, mode) + 4, textAnchor: 'end', fontSize: 11, fill: isPar ? '#5ABAAA' : '#3A4A60', fontWeight: isPar ? 700 : 400, textContent: t.toFixed(1) + 'x' }, svg);
  });

  [0, 20, 40, 60, 80, 100].forEach(t => {
    el('line', { x1: sx(t), y1: M.top, x2: sx(t), y2: M.top + PH, stroke: '#1A2A3A', strokeWidth: 0.5 }, svg);
    el('text', { x: sx(t), y: M.top + PH + 18, textAnchor: 'middle', fontSize: 11, fill: '#3A4A60', textContent: t + '%' }, svg);
  });

  el('text', { x: sx((X_MIN + X_MAX) / 2), y: M.top + PH + 48, textAnchor: 'middle', fontSize: 12, fill: '#4A5A70', fontWeight: 600, textContent: '% Capital Called' }, svg);
  const yLabel = mode === 'tvpi' ? 'TVPI' : 'MOIC';
  el('text', { x: 14, y: sy((yr.min + yr.max) / 2, mode), textAnchor: 'middle', fontSize: 12, fill: '#4A5A70', fontWeight: 600, textContent: yLabel, transform: 'rotate(-90, 14, ' + sy((yr.min + yr.max) / 2, mode) + ')' }, svg);

  const ghostLayer = el('g', { style: 'pointer-events:none' }, svg);

  funds.forEach(fund => {
    const val = getVal(fund, mode);
    if (val === null || val === undefined) return;
    if (fund.pctCalled === null || fund.pctCalled === undefined) return;
    const cx = sx(fund.pctCalled), cyy = sy(val, mode);
    const isActive = !activeVintage || fund.vintage === activeVintage;
    const vcfg = vintageConfig[fund.vintage];
    const color = vcfg ? vcfg.color : '#888';

    if (!isActive) {
      el('circle', { cx: cx, cy: cyy, r: 7, fill: color, opacity: 0.08 }, svg);
      return;
    }

    const g = el('g', { class: 'dot-group', style: 'cursor:pointer' }, svg);
    const glow = el('circle', { cx: cx, cy: cyy, r: 16, fill: color, opacity: 0 }, g);
    el('circle', { cx: cx, cy: cyy, r: 7, fill: color, stroke: '#0A1020', strokeWidth: 2, opacity: 0.9 }, g);

    if (mode === 'tvpi' && fund.benchmark) {
      el('circle', { cx: cx, cy: cyy, r: 10.5, fill: 'none', stroke: benchmarkRingColors[fund.benchmark], strokeWidth: 1.8, opacity: 0.5 }, g);
    }

    var prevVal = mode === 'tvpi' ? fund.tvpiPrev : fund.moicPrev;
    var prevPct = fund.pctCalledPrev;
    var hasGhost = prevVal !== null && prevVal !== undefined && prevPct !== null && prevPct !== undefined;
    var prevQLabel = '';
    var qi = SCATTER_DATA.quarters.indexOf(selectedQuarter);
    if (qi > 0) prevQLabel = SCATTER_DATA.quarter_labels[SCATTER_DATA.quarters[qi - 1]] || '';

    g.addEventListener('mouseenter', () => {
      glow.setAttribute('opacity', '0.1');
      if (hasGhost) {
        const gx = sx(prevPct), gy = sy(prevVal, mode);
        const diff = val - prevVal;
        const lineColor = diff > 0.005 ? '#2ECDA760' : diff < -0.005 ? '#E07A5F60' : '#5A6A8060';

        el('line', { x1: gx, y1: gy, x2: cx, y2: cyy, stroke: lineColor, strokeWidth: 1.5, strokeDasharray: '4 3' }, ghostLayer);

        const angle = Math.atan2(cyy - gy, cx - gx);
        const aLen = 8;
        const ax1 = cx - aLen * Math.cos(angle - 0.4);
        const ay1 = cyy - aLen * Math.sin(angle - 0.4);
        const ax2 = cx - aLen * Math.cos(angle + 0.4);
        const ay2 = cyy - aLen * Math.sin(angle + 0.4);
        el('polygon', { points: cx+','+cyy+' '+ax1+','+ay1+' '+ax2+','+ay2, fill: lineColor.replace('60','90') }, ghostLayer);

        el('circle', { cx: gx, cy: gy, r: 6, fill: color, opacity: 0.25, stroke: color, strokeWidth: 1.5, strokeDasharray: '3 2' }, ghostLayer);
        el('text', { x: gx, y: gy - 12, textAnchor: 'middle', fontSize: 9, fontWeight: 600, fill: '#6A7A90', textContent: prevQLabel }, ghostLayer);
      }
    });

    g.addEventListener('mouseleave', () => {
      glow.setAttribute('opacity', '0');
      ghostLayer.innerHTML = '';
    });

    g.addEventListener('click', (e) => { e.stopPropagation(); showCard(fund, cx, cyy); });
  });
}

function renderControls() {
  const ctr = document.getElementById('controls');
  ctr.innerHTML = '<span class="controls-label">Vintage:</span>';
  Object.entries(vintageConfig).forEach(([yr, cfg]) => {
    const btn = document.createElement('button');
    btn.className = 'vint-btn' + (activeVintage === +yr ? ' active' : '');
    btn.style.setProperty('--vc', cfg.color);
    btn.innerHTML = '<span class="vint-dot" style="background:' + cfg.color + '"></span><span class="vint-text" style="color:' + cfg.color + '">' + yr + '</span>';
    btn.onclick = () => { activeVintage = activeVintage === +yr ? null : +yr; closeCard(); renderControls(); render(); };
    ctr.appendChild(btn);
  });

  var sep = document.createElement('span');
  sep.style.cssText = 'border-left:1px solid rgba(255,255,255,0.08);height:20px;margin:0 6px';
  ctr.appendChild(sep);

  var qlabel = document.createElement('span');
  qlabel.className = 'controls-label';
  qlabel.textContent = 'Quarter:';
  ctr.appendChild(qlabel);

  var select = document.createElement('select');
  select.id = 'quarterSelect';
  select.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#E0E6EF;font-family:inherit;font-size:11px;font-weight:600;padding:5px 10px;outline:none;cursor:pointer;';
  SCATTER_DATA.quarters.slice().reverse().forEach(function(q) {
    var opt = document.createElement('option');
    opt.value = q;
    opt.textContent = SCATTER_DATA.quarter_labels[q];
    if (q === selectedQuarter) opt.selected = true;
    select.appendChild(opt);
  });
  select.onchange = function() { changeQuarter(this.value); };
  ctr.appendChild(select);

  var hint = document.createElement('div');
  hint.className = 'hint';
  hint.innerHTML = '<svg width="14" height="14" xmlns="' + NS + '"><circle cx="7" cy="7" r="4" fill="#00CFDD" stroke="#0A1020" stroke-width="1.5"/><circle cx="7" cy="7" r="6.5" fill="none" stroke="#2ECDA7" stroke-width="1.2" opacity="0.4"/></svg> benchmark ring (TVPI only) · click dot for details';
  ctr.appendChild(hint);
}

function renderSummary() {
  const mode = currentMode;
  const valid = funds.filter(f => getVal(f, mode) !== null);
  const par = yRanges[mode].parLine;
  const earlyDeploy = valid.filter(f => f.pctCalled < 30);
  const outperformers = valid.filter(f => f.pctCalled >= 30 && f.pctCalled < 80 && getVal(f, mode) >= par);
  const activeJ = valid.filter(f => f.pctCalled >= 30 && f.pctCalled < 80 && getVal(f, mode) < par);
  const advanced = valid.filter(f => f.pctCalled >= 80);
  const avgAdv = advanced.length ? (advanced.reduce((s, f) => s + getVal(f, mode), 0) / advanced.length).toFixed(2) : '—';
  const label = mode.toUpperCase();

  const stats = [
    { value: earlyDeploy.length, label: 'Early Deployment', sub: '<30% called', accent: '#5C5C6B' },
    { value: outperformers.length, label: 'Early Outperformers', sub: '30-80% & ' + label + ' ≥' + par.toFixed(1) + 'x', accent: '#A4C48C' },
    { value: activeJ.length, label: mode === 'tvpi' ? 'Active J-Curve' : 'Building Value', sub: '30-80% & ' + label + ' <' + par.toFixed(1) + 'x', accent: '#D4A574' },
    { value: advanced.length, label: 'Advanced Deployment', sub: '>80% · avg ' + label + ' ' + avgAdv + 'x', accent: '#8B9CC4' },
  ];

  const container = document.getElementById('summary');
  container.innerHTML = '';
  stats.forEach(s => {
    const c = document.createElement('div');
    c.className = 'stat-card';
    c.style.borderLeft = '3px solid ' + s.accent;
    c.innerHTML = '<div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div><div class="stat-sub">' + s.sub + '</div>';
    container.appendChild(c);
  });
}

var qLabel = SCATTER_DATA.quarter_labels[selectedQuarter] || selectedQuarter;
document.getElementById('mainTitle').textContent = 'TVPI vs. % Capital Called — ' + qLabel;
renderControls();
updateContextNote();
render();
renderSummary();
} // end initDashboard
</script>
</body>
</html>
